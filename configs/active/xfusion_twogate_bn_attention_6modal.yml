name: xfusion_033_twogate_bn_attention_6modal
description: >
  Bottleneck-level token cross-attention: same 6-modal setup as xfusion_027
  (no extractor, 1×1 proj, rich pixel gate) but token attention is injected
  at the UNet bottleneck (32×32) instead of the decoder output (256×256).
  No pooling or upsampling in the attention path — Q=1024 (32×32 bottleneck),
  KV=1024 (4×16×16 token sources), perfectly balanced. Token signal propagates
  through all three decoder stages. All other settings match xfusion_027.
reference:
  parent: configs/active/xfusion_twogate_attention_6modal_ep60.yml
  change: "model_type xfusion_twogate_attention→xfusion_twogate_bn_attention (bottleneck injection)"
data:
  train_embeddings_dir: /projects/bcrm/emb2height/data/train/alphaearth_emb
  secondary_train_embeddings_dir: /projects/bcrm/emb2height/data/train/tessera_emb
  token_train_embeddings_dir: /projects/bcrm/emb2height/data/train/terramind_s1_emb
  secondary_token_train_embeddings_dir: /projects/bcrm/emb2height/data/train/terramind_s2_emb
  third_token_train_embeddings_dir: /projects/bcrm/emb2height/data/train/thor_s1_emb
  fourth_token_train_embeddings_dir: /projects/bcrm/emb2height/data/train/thor_s2_emb
  train_targets_dir: /projects/bcrm/emb2height/data/train/labels
  patch_size: 256
model:
  model_type: xfusion_twogate_bn_attention
  tessera_presence_ch: 0
  tessera_hidden_ch: 96
  tessera_hidden_depth: 2
  height_specialist_depth: 2
  height_gate_source: alpha
  height_hidden_ch:
  height_trunk_depth: 2
  height_independent_branches: false
  height_head_kind: linear
  height_n_bins: 64
  height_bin_max_m: 80.0
  lightunet_base_ch: 48
  lightunet_norm_kind: bn
  gate_mode: rich
  gate_untied: false
  gate_init_bias: 4.0
  modality_dropout: 0.0
  presence_head_kind: shared
  presence_head_depth: 1
  presence_branch_ch:
training:
  batch_size: 12
  epochs: 60
  lr: 0.0002
  weight_decay: 0.0001
  seed: 42
  grad_accum_steps: 3
  loss_preset: presence_centered
  weight_mae: 1.0
  weight_presence_tversky: 1.0
  weight_fraction_mae: 0.1
  weight_height_boost: 2.0
  aux_weight: 1.0
  height_loss_kind: l1
  huber_delta: 1.0
  build_height_boost: 5.0
  veg_height_boost: 1.5
  aux_veg_weight: 1.0
  height_bin_aux_weight: 0.0
  height_bin_sigma_bins: 1.5
runtime:
  experiment_name: xfusion_033_twogate_bn_attention_6modal
  output_dir: /u/dingqi2/workspace/esa/emb2heights-backbone/runs
  amp: true
  data_parallel: false
  num_workers: 4
  prefetch_factor: 1
  init_from_pretrain:
  init_pretrain_strict: false
