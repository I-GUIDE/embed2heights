name: xfusion_095_hybrid_tm_calib_only_ep60
description: >
  xf085 (CrossSourceHybridFiLMFusion) + token_calibration on TM sources only (indices 0,1).
  Motivation: xf093 showed full calib gives +0.0002 Score but trades iou_wat -0.0123.
  xf094 (hier+full calib) showed calib applied to THOR causes iou_wat collapse (0.5111).
  Hypothesis: THOR's raw ±17000 scale is critical for gate polarization on water patches;
  calibrating THOR disrupts its saturation asymmetry. Apply calib only to TM (indices 0,1:
  terramind_s1, terramind_s2) to align TM channels without touching THOR's raw scale.
  Expected: retain xf093's building IoU gain (+0.0044) while recovering xf093's water loss
  (-0.0123). If successful, iou_wat should recover toward xf085 (0.5284) while keeping
  iou_bld improvement from calib.
reference: xfusion_093_hybrid_token_calib_ep60

data:
  train_embeddings_dir: ${REPO_DIR}/../data/train/alphaearth_emb
  secondary_train_embeddings_dir: ${REPO_DIR}/../data/train/tessera_emb
  token_train_embeddings_dir: ${REPO_DIR}/../data/train/terramind_s1_emb
  secondary_token_train_embeddings_dir: ${REPO_DIR}/../data/train/terramind_s2_emb
  third_token_train_embeddings_dir: ${REPO_DIR}/../data/train/thor_s1_emb
  fourth_token_train_embeddings_dir: ${REPO_DIR}/../data/train/thor_s2_emb
  train_targets_dir: ${REPO_DIR}/../data/train/labels
  split_file: ${REPO_DIR}/splits/split.json
  patch_size: 256
  val_split: 0.2

model:
  model_type: xfusion_unet_hybrid_cross_source
  lightunet_base_ch: 48
  lightunet_norm_kind: bn
  tessera_presence_ch: 0
  tessera_hidden_ch: 96
  tessera_hidden_depth: 2
  height_specialist_depth: 1
  height_gate_source: alpha
  height_hidden_ch: 96
  height_trunk_depth: 2
  height_independent_branches: true
  height_head_kind: linear
  height_n_bins: 64
  height_bin_max_m: 80.0
  gate_mode: rich
  gate_untied: false
  gate_init_bias: 4.0
  modality_dropout: 0.0
  presence_head_kind: split_all
  presence_head_depth: 1
  presence_branch_ch: 48
  use_fraction_aux: true
  use_fraction_film: false
  token_calibration: true
  token_calibration_source_indices: [0, 1]

training:
  batch_size: 16
  epochs: 60
  lr: 0.0002
  weight_decay: 0.0001
  seed: 42
  grad_accum_steps: 1
  weight_mae: 1.0
  weight_presence_tversky: 1.0
  weight_fraction_mae: 0.1
  weight_height_boost: 2.0
  aux_weight: 1.0
  height_loss_kind: l1
  huber_delta: 1.0
  build_height_boost: 5.0
  veg_height_boost: 1.5
  aux_veg_weight: 1.0
  height_bin_aux_weight: 0.0
  height_bin_sigma_bins: 1.5
  tversky_water_alpha: 0.3
  water_empty_topk: 512
  weight_water_empty_topk: 0.03

runtime:
  experiment_name: xfusion_095_hybrid_tm_calib_only_ep60
  output_dir: ${REPO_DIR}/runs
  amp: false
  data_parallel: false
  num_workers: 4
  prefetch_factor: 1
