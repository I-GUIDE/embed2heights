name: xfusion_083_hybrid_cross_source_ep60
description: >
  xfusion_083: cross-source self-attention + hybrid affine/additive token fusion.
  Same dual-LightUNet pixel backbone and 4-source token setup as xfusion_082, but
  the PerModalityFiLM fusion is replaced by CrossSourceHybridFiLMFusion: token
  sources first refine via self-attention with modality embeddings, then each
  refined source contributes a zero-init (FiLM + additive + spatial-gate) residual.
  Single variable change vs xfusion_082 to isolate the fusion-module contribution.
reference: xfusion_081_aux_frac_no_height_film_water_empty_topk_ep60

data:
  train_embeddings_dir: ${REPO_DIR}/../data/train/alphaearth_emb
  secondary_train_embeddings_dir: ${REPO_DIR}/../data/train/tessera_emb
  token_train_embeddings_dir: ${REPO_DIR}/../data/train/terramind_s1_tokens
  secondary_token_train_embeddings_dir: ${REPO_DIR}/../data/train/terramind_s2_tokens
  third_token_train_embeddings_dir: ${REPO_DIR}/../data/train/thor_s1_tokens
  fourth_token_train_embeddings_dir: ${REPO_DIR}/../data/train/thor_s2_tokens
  train_targets_dir: ${REPO_DIR}/../data/train/labels
  split_file: ${REPO_DIR}/splits/xfusion_083_hybrid_cross_source_seed42.json
  patch_size: 256
  val_split: 0.2

model:
  model_type: xfusion_unet_hybrid_cross_source
  lightunet_base_ch: 48
  lightunet_norm_kind: bn
  tessera_presence_ch: 16
  tessera_hidden_ch: 96
  tessera_hidden_depth: 2
  height_specialist_depth: 1
  height_gate_source: alpha
  height_hidden_ch: 96
  height_trunk_depth: 2
  height_independent_branches: true
  height_head_kind: linear
  height_n_bins: 64
  height_bin_max_m: 80.0
  gate_mode: rich
  gate_untied: true
  gate_init_bias: 4.0
  modality_dropout: 0.0
  presence_head_kind: split_all
  presence_head_depth: 1
  presence_branch_ch: 48
  use_fraction_aux: true
  use_fraction_film: false
  attn_heads: 4
  use_additive: true
  use_spatial_gate: true

training:
  batch_size: 16
  epochs: 60
  lr: 0.0002
  weight_decay: 0.0001
  seed: 42
  grad_accum_steps: 1
  weight_mae: 1.0
  weight_presence_tversky: 1.0
  weight_fraction_mae: 0.1
  weight_height_boost: 2.0
  aux_weight: 1.0
  height_loss_kind: l1
  huber_delta: 1.0
  build_height_boost: 5.0
  veg_height_boost: 0.0
  aux_veg_weight: 1.0
  height_bin_aux_weight: 0.0
  height_bin_sigma_bins: 1.5
  tversky_water_alpha: 0.3
  water_empty_topk: 512
  weight_water_empty_topk: 0.03

runtime:
  experiment_name: xfusion_083_hybrid_cross_source_ep60
  output_dir: ${REPO_DIR}/runs
  amp: false
  data_parallel: false
  num_workers: 4
  prefetch_factor: 1
