name: xfusion_057_film_fusion_ep60
description: >
  FiLM Fusion: pixel branch via linear projection (no UNet), patch branch via
  4-source softmax gated mixer at 16x16 upsampled to 256x256, FiLM modulation
  (zero-initialized), 2-layer GN+GELU decoder, existing prediction head unchanged.
  AE normalized with GroupNorm(1,64); Tessera via ChannelCalibration; tokens z-scored.
reference:
  parent: configs/active/xfusion_056_cqa_attention_bias_ep60.yml
  change: "Entirely new backbone: no LightUNet, no cross-attention; FiLM-based pixel+patch fusion"
data:
  train_embeddings_dir: /projects/bcrm/emb2height/data/train/alphaearth_emb
  secondary_train_embeddings_dir: /projects/bcrm/emb2height/data/train/tessera_emb
  token_train_embeddings_dir: /projects/bcrm/emb2height/data/train/terramind_s1_emb
  secondary_token_train_embeddings_dir: /projects/bcrm/emb2height/data/train/terramind_s2_emb
  third_token_train_embeddings_dir: /projects/bcrm/emb2height/data/train/thor_s1_emb
  fourth_token_train_embeddings_dir: /projects/bcrm/emb2height/data/train/thor_s2_emb
  token_normalization: train_channel_zscore
  token_normalization_source_indices:
  token_normalization_stats_path:
  train_targets_dir: /projects/bcrm/emb2height/data/train/labels
  split_file:
  patch_size: 256
model:
  model_type: xfusion_film_fusion
  tessera_presence_ch: 0
  tessera_hidden_ch:
  tessera_hidden_depth: 0
  height_specialist_depth: 2
  height_gate_source: alpha
  height_hidden_ch:
  height_trunk_depth: 2
  height_independent_branches: false
  height_head_kind: linear
  height_n_bins: 64
  height_bin_max_m: 80.0
  lightunet_base_ch: 48
  lightunet_norm_kind: bn
  gate_mode: rich
  gate_untied: false
  gate_init_bias: 4.0
  modality_dropout: 0.0
  use_token_extractor: false
  token_extractor_mid_ch:
  token_query_grid: 16
  token_calibration: true
  presence_head_kind: shared
  presence_head_depth: 1
  presence_branch_ch:
training:
  batch_size: 12
  epochs: 60
  lr: 0.00005
  weight_decay: 0.0001
  seed: 42
  grad_accum_steps: 3
  loss_preset: presence_centered
  weight_mae: 1.0
  weight_presence_tversky: 1.0
  weight_fraction_mae: 0.1
  weight_height_boost: 2.0
  aux_weight: 1.0
  height_loss_kind: l1
  huber_delta: 1.0
  build_height_boost: 5.0
  veg_height_boost: 1.5
  aux_veg_weight: 1.0
  height_bin_aux_weight: 0.0
  height_bin_sigma_bins: 1.5
runtime:
  experiment_name: xfusion_057_film_fusion_ep60
  output_dir: /u/dingqi2/workspace/esa/emb2heights-backbone/runs
  amp: false
  data_parallel: false
  num_workers: 4
  prefetch_factor: 1
  init_from_pretrain:
  init_pretrain_strict: false
